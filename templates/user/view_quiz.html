{% extends "user/user_base.html" %}

{% block title %}View Quiz{% endblock %}

{% block content %}
    <div class="d-grid h-100" style="place-items: center">
        <div class="w-100" style="max-width: 500px">
            <div class="w-100 bg-body-secondary px-5 py-4 rounded-3 shadow">
                <h2 class="text-center">Welcome to Quiz Master</h2>
                <h1 class="text-center">View Quiz</h1>
                <div class="mb-3">
                    <label for="id" class="form-label">Quiz ID</label>
                    <input
                        type="text"
                        name="id"
                        id="id"
                        class="form-control"
                        required
                        readonly
                        value="{{ quiz.id }}"
                    />
                </div>
                <div class="mb-3">
                    <label for="subject" class="form-label">Subject</label>
                    <input
                        type="text"
                        name="subject"
                        id="subject"
                        class="form-control"
                        required
                        readonly
                        value="{{ quiz.subject }}"
                    />
                </div>
                <div class="mb-3">
                    <label for="chapter" class="form-label">Chapter</label>
                    <input
                        type="text"
                        name="chapter"
                        id="chapter"
                        class="form-control"
                        required
                        readonly
                        value="{{ quiz.chapter }}"
                    />
                </div>
                <div class="mb-3">
                    <label for="num_questions" class="form-label">Number Of Questions</label>
                    <input
                        type="text"
                        name="num_questions"
                        id="num_questions"
                        class="form-control"
                        required
                        readonly
                        value="{{ quiz.num_questions }}"
                    />
                </div>
                <div class="mb-3">
                    <label for="date_of_quiz" class="form-label">Scheduled Date</label>
                    <input
                        type="text"
                        name="date_of_quiz"
                        id="date_of_quiz"
                        class="form-control"
                        required
                        readonly
                        value="{{ quiz.date_of_quiz.strftime('%d/%m/%Y') }}"
                    />
                </div>
                <div class="mb-3">
                    <label for="time_duration" class="form-label">Duration (hh:mm)</label>
                    <input
                        type="text"
                        name="time_duration"
                        id="time_duration"
                        class="form-control"
                        required
                        readonly
                        value="{{ quiz.time_duration }}"
                    />
                </div>
                <div class="d-flex">
                    <a href="/dashboard" class="btn btn-primary col-6">Close</a>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
