{% extends "admin/admin_base.html" %}
{% block title %}Create a New Subject{% endblock %}
{% block content %}
    <div class="d-grid h-100" style="place-items: center">
        <div class="w-100" style="max-width: 500px">
            {% if errors %}
                <div class="alert alert-danger" role="alert">
                    <ul class="m-0">
                        {% for error in errors %}
                            <li>{{ error }}</li>
                        {% endfor %}
                    </ul>
                </div>
            {% endif %}

            <div class="w-100 bg-body-secondary px-5 py-4 rounded-3 shadow">
                <h3 class="text-center">New Quiz on Chapter {{ chapter.name }}</h3>
                <form action="/admin/new-quiz/{{ chapter_id }}" method="post">

                    <div class="mb-3">
                        <label for="date_of_quiz" class="form-label">Date of Quiz:</label>
                        <input
                            type="date"
                            name="date_of_quiz"
                            id="date_of_quiz"
                            class="form-control"
                            required
                        />
                    </div>

                    <div class="mb-3">
                        <label for="time_duration" class="form-label">Time Duration:</label>
                        <input
                            type="text"
                            name="time_duration"
                            id="time_duration"
                            class="form-control"
                            pattern="[0-9]{2}:[0-6][0-9]"
                            placeholder="HH:MM"
                            required
                        />
                    </div>

                    <div class="mb-3">
                        <label for="remarks" class="form-label">Remarks:</label>
                        <textarea
                            name="remarks"
                            id="remarks"
                            class="form-control"
                            required
                        ></textarea>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary col-6">Save</button>
                        <a href="/admin/quizes/{{ chapter_id }}" class="btn btn-primary col-6">Cancel</a>
                    </div>

                </form>
            </div>

        </div>
    </div>
{% endblock %}
