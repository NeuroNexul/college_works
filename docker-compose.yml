version: "3.7"

services:
  database:
    container_name: ${CONTAINER_NAME}-database
    image: mysql:8.0
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${DATABASE_NAME}
      MYSQL_USER: ${DATABASE_USER}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DATABASE_ROOT_PASSWORD}
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u$$DATABASE_USER",
          "-p$$DATABASE_ROOT_PASSWORD",
        ]
      interval: 20s
      timeout: 20s
      retries: 10
    ports:
      - "${DATABASE_PORT}:3306"
    volumes:
      - ./db:/var/lib/mysql
    networks:
      - internal

  phpmyadmin:
    container_name: ${CONTAINER_NAME}-phpmyadmin
    image: phpmyadmin/phpmyadmin
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PMA_HOST: database
      PMA_PORT: ${DATABASE_PORT}
      PMA_PASSWORD: ${DATABASE_ROOT_PASSWORD}
    ports:
      - "${PHPMYADMIN_PORT}:80"
    networks:
      - internal

networks:
  internal:
    driver: bridge
